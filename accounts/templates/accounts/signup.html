{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<section class="card narrow">
    <h1>Create an account</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="primary">Sign up</button>
    </form>
    <p class="meta">Already have an account? <a href="{% url 'login' %}">Log in</a>.</p>
</section>
{% endblock %}
