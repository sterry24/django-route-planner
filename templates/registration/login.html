{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<section class="card narrow">
    <h1>Log in</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="primary">Log in</button>
    </form>
    <p class="meta">No account yet? <a href="{% url 'accounts:signup' %}">Sign up</a>.</p>
</section>
{% endblock %}
